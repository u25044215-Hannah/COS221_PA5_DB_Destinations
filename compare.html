<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compare Packages</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/compare.css" />
</head>
<body>

  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-logo">
  <img src="images/logo.png" alt="Tripistry Logo" class="nav-logo-img">
</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="browse.html">Browse Packages</a></li>
      <li><a href="compare.html" class="active">Compare</a></li>
      <li><a href="bookings.html">My Bookings</a></li>
    </ul>
    <div class="nav-actions">
      <a href="login.html" class="btn btn-outline btn-sm">Log In</a>
      <a href="register.html" class="btn btn-primary btn-sm">Sign Up</a>
    </div>
  </nav>

  <div class="page-hero">
    <div class="container">
      <span class="eyebrow">Side by Side</span>
      <h1>Compare Packages</h1>
    </div>
  </div>

  <div class="container" style="padding-top:40px;padding-bottom:60px">

    <div class="compare-empty" id="compare-empty">
      <div class="compare-empty-icon"></div>
      <h2>No packages selected yet</h2>
      <a href="browse.html" class="btn btn-primary btn-lg" style="margin-top:24px">Browse Packages</a>
    </div>

    <div id="compare-table-wrap" style="display:none">

      <div class="compare-actions-bar">
        <span id="compare-count-label" class="text-muted"></span>
        <div style="display:flex;gap:10px">
          <a href="browse.html" class="btn btn-outline btn-sm">+ Add More</a>
          <button class="btn btn-ghost btn-sm" id="clear-compare-all">Clear All</button>
        </div>
      </div>

      <div class="compare-scroll-wrap">
        <table class="compare-table" id="compare-table">
          <thead>
            <tr id="compare-header-row">
              <th class="compare-row-label">Package</th>
            </tr>
          </thead>
          <tbody id="compare-tbody">
          </tbody>
        </table>
      </div>

      <div class="compare-book-row" id="compare-book-row">
      </div>
    </div>

  </div>
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/compare.js"></script>
</body>
</html>
