<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Packages — Tripistry Agency</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/agency.css" />
</head>
<body>

  <nav class="navbar" id="navbar">
    <a href="../traveller ui/index.html" class="nav-logo">
      <img src="images/logo.png" alt="Tripistry Logo" class="nav-logo-img">
    </a>
    <ul class="nav-links">
      <li><a href="agency-dashboard.html">Dashboard</a></li>
      <li><a href="agency-packages.html" class="active">Packages</a></li>
      <li><a href="agency-group-trips.html">Group Trips</a></li>
    </ul>
    <div class="nav-actions">
      <span class="agency-badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Agency Portal
      </span>
      <a href="../traveller ui/login.html" class="btn btn-outline btn-sm">Log Out</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="agency-hero">
    <div class="container">
      <span class="eyebrow">Package Management</span>
      <h1>Your Travel Packages</h1>
      <p>Create, edit and manage all packages offered by your agency.</p>
    </div>
  </section>

  <main class="container agency-main">

    <!-- TOOLBAR -->
    <div class="pkg-toolbar">
      <div class="pkg-toolbar-left">
        <div class="search-input-wrap" style="width:280px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="pkg-search" placeholder="Search packages…" />
        </div>
        <select id="pkg-status-filter" class="card-select">
          <option value="">All Status</option>
          <option value="active">Active</option>
          <option value="draft">Draft</option>
          <option value="archived">Archived</option>
        </select>
      </div>
      <button class="btn btn-primary" id="add-pkg-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Package
      </button>
    </div>

    <!-- PACKAGES GRID -->
    <div class="packages-manage-grid" id="packages-manage-grid">
      <!-- Populated by JS -->
    </div>

  </main>

  <!-- ═══════════════ ADD / EDIT MODAL ═══════════════ -->
  <div class="modal-overlay" id="pkg-modal" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Add New Package</h2>
        <button class="modal-close" id="close-modal">✕</button>
      </div>

      <form class="modal-form" id="pkg-form" novalidate>
        <input type="hidden" id="edit-id" />

        <div class="form-grid-2">
          <div class="form-group">
            <label>Package Name <span class="req">*</span></label>
            <input type="text" id="pkg-name" placeholder="e.g. Bali Bliss 10 Days" required />
            <span class="field-error" id="err-name"></span>
          </div>
          <div class="form-group">
            <label>Destination <span class="req">*</span></label>
            <input type="text" id="pkg-destination" placeholder="e.g. Bali, Indonesia" required />
            <span class="field-error" id="err-destination"></span>
          </div>
        </div>

        <div class="form-grid-3">
          <div class="form-group">
            <label>Price per Person (ZAR) <span class="req">*</span></label>
            <input type="number" id="pkg-price" placeholder="28500" min="0" required />
            <span class="field-error" id="err-price"></span>
          </div>
          <div class="form-group">
            <label>Duration (Days) <span class="req">*</span></label>
            <input type="number" id="pkg-duration" placeholder="10" min="1" required />
            <span class="field-error" id="err-duration"></span>
          </div>
          <div class="form-group">
            <label>Max Travellers</label>
            <input type="number" id="pkg-max" placeholder="20" min="1" />
          </div>
        </div>

        <div class="form-group">
          <label>Category</label>
          <select id="pkg-category">
            <option value="">Select category</option>
            <option value="adventure">Adventure</option>
            <option value="beach">Beach & Relaxation</option>
            <option value="cultural">Cultural</option>
            <option value="luxury">Luxury</option>
            <option value="family">Family</option>
            <option value="honeymoon">Honeymoon</option>
          </select>
        </div>

        <div class="form-group">
          <label>Description <span class="req">*</span></label>
          <textarea id="pkg-description" rows="4" placeholder="Describe what's included, highlights, accommodation…" required></textarea>
          <span class="field-error" id="err-description"></span>
        </div>

        <div class="form-group">
          <label>Itinerary (one item per line)</label>
          <textarea id="pkg-itinerary" rows="5" placeholder="Day 1: Arrival in Bali, hotel check-in&#10;Day 2: Ubud rice terraces tour&#10;Day 3: Tanah Lot temple visit…"></textarea>
        </div>

        <div class="form-grid-2">
          <div class="form-group">
            <label>Inclusions (comma-separated)</label>
            <input type="text" id="pkg-inclusions" placeholder="Flights, Hotel, Breakfast, Tours" />
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="pkg-status">
              <option value="active">Active</option>
              <option value="draft">Draft</option>
              <option value="archived">Archived</option>
            </select>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" id="cancel-modal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="save-pkg-btn">Save Package</button>
        </div>
      </form>
    </div>
  </div>

  <!-- DELETE CONFIRM MODAL -->
  <div class="modal-overlay" id="delete-modal" style="display:none;">
    <div class="modal modal--sm">
      <div class="modal-header">
        <h2>Delete Package?</h2>
        <button class="modal-close" id="close-delete-modal">✕</button>
      </div>
      <p style="padding:0 24px 8px;color:var(--grey-text);">
        Are you sure you want to delete <strong id="delete-pkg-name"></strong>? This action cannot be undone.
      </p>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="cancel-delete">Cancel</button>
        <button class="btn" style="background:#e54d4d;color:white;" id="confirm-delete">Delete</button>
      </div>
    </div>
  </div>

  <script>
    // ── Data Store ─────────────────────────────────────────────
    let packages = [
      { id: 1, name: 'Bali Bliss 10D',    destination: 'Bali, Indonesia',      price: 28500, duration: 10, max: 20, category: 'beach',     status: 'active',   description: 'A magical journey through the island of gods.', itinerary: 'Day 1: Arrival\nDay 2: Ubud\nDay 3: Tanah Lot', inclusions: 'Flights, Hotel, Breakfast', bookings: 18 },
      { id: 2, name: 'Swiss Alps 7D',      destination: 'Interlaken, Switzerland', price: 45200, duration: 7,  max: 15, category: 'adventure', status: 'active',   description: 'Epic alpine scenery and adrenaline adventures.', itinerary: 'Day 1: Zurich arrival\nDay 2: Jungfraujoch', inclusions: 'Flights, Hotel, Cable Car Passes', bookings: 11 },
      { id: 3, name: 'London Explorer',    destination: 'London, UK',            price: 32000, duration: 8,  max: 25, category: 'cultural',  status: 'active',   description: 'Iconic landmarks, world-class museums and theatre.', itinerary: 'Day 1: Arrival, Tower of London\nDay 2: British Museum', inclusions: 'Flights, Hotel, Museum Pass', bookings: 9 },
      { id: 4, name: 'Tokyo 8D',           destination: 'Tokyo, Japan',          price: 51000, duration: 8,  max: 12, category: 'cultural',  status: 'active',   description: 'Neon nights, ancient temples and sushi culture.', itinerary: 'Day 1: Shinjuku\nDay 2: Asakusa\nDay 3: Shibuya', inclusions: 'Flights, Hotel, Rail Pass', bookings: 7 },
      { id: 5, name: 'Zanzibar Beach 5D',  destination: 'Zanzibar, Tanzania',    price: 19800, duration: 5,  max: 30, category: 'beach',     status: 'active',   description: 'Crystal waters and white sand beaches.', itinerary: 'Day 1: Stone Town\nDay 2: Snorkelling', inclusions: 'Flights, Hotel, Breakfast, Snorkel Tour', bookings: 3 },
      { id: 6, name: 'Paris Getaway 4D',   destination: 'Paris, France',         price: 38000, duration: 4,  max: 20, category: 'luxury',    status: 'draft',    description: 'Romance, art, cuisine — the City of Light awaits.', itinerary: 'Day 1: Eiffel Tower\nDay 2: Louvre', inclusions: 'Flights, 5-Star Hotel, Seine Cruise', bookings: 0 },
    ];
    let nextId = 7;
    let deletingId = null;

    // ── Render Cards ───────────────────────────────────────────
    const catEmoji = { adventure:'🏔️', beach:'🏖️', cultural:'🏛️', luxury:'💎', family:'👨‍👩‍👧', honeymoon:'💑' };

    function renderPackages() {
      const search = document.getElementById('pkg-search').value.toLowerCase();
      const statusF = document.getElementById('pkg-status-filter').value;
      const filtered = packages.filter(p =>
        (!search || p.name.toLowerCase().includes(search) || p.destination.toLowerCase().includes(search)) &&
        (!statusF || p.status === statusF)
      );
      const grid = document.getElementById('packages-manage-grid');
      if (!filtered.length) {
        grid.innerHTML = '<div class="empty-state"><p>No packages found.</p><button class="btn btn-primary" onclick="openAddModal()">+ Add Package</button></div>';
        return;
      }
      grid.innerHTML = filtered.map(p => `
        <div class="pkg-manage-card" data-id="${p.id}">
          <div class="pkg-manage-top">
            <div class="pkg-manage-cat">${catEmoji[p.category] || '✈️'} ${p.category || 'General'}</div>
            <span class="status-badge status-badge--${p.status}">${p.status}</span>
          </div>
          <h3 class="pkg-manage-name">${p.name}</h3>
          <p class="pkg-manage-dest">📍 ${p.destination}</p>
          <p class="pkg-manage-desc">${p.description}</p>
          <div class="pkg-manage-meta">
            <div class="pkg-meta-item">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              ${p.duration} days
            </div>
            <div class="pkg-meta-item">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
              Max ${p.max || '–'}
            </div>
            <div class="pkg-meta-item">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/></svg>
              ${p.bookings} bookings
            </div>
          </div>
          <div class="pkg-manage-price">R ${p.price.toLocaleString()}<span> / person</span></div>
          <div class="pkg-manage-actions">
            <button class="btn btn-sm" style="background:var(--sky-light);color:var(--dark);" onclick="openEditModal(${p.id})">
              ✏️ Edit
            </button>
            <button class="btn btn-sm" style="background:#fde8e8;color:#c0392b;" onclick="openDeleteModal(${p.id})">
              🗑️ Delete
            </button>
          </div>
        </div>`).join('');
    }

    // ── Modal Logic ────────────────────────────────────────────
    function openAddModal() {
      document.getElementById('modal-title').textContent = 'Add New Package';
      document.getElementById('edit-id').value = '';
      document.getElementById('pkg-form').reset();
      clearErrors();
      document.getElementById('pkg-modal').style.display = 'flex';
    }

    function openEditModal(id) {
      const p = packages.find(x => x.id === id);
      if (!p) return;
      document.getElementById('modal-title').textContent = 'Edit Package';
      document.getElementById('edit-id').value = id;
      document.getElementById('pkg-name').value = p.name;
      document.getElementById('pkg-destination').value = p.destination;
      document.getElementById('pkg-price').value = p.price;
      document.getElementById('pkg-duration').value = p.duration;
      document.getElementById('pkg-max').value = p.max || '';
      document.getElementById('pkg-category').value = p.category || '';
      document.getElementById('pkg-description').value = p.description;
      document.getElementById('pkg-itinerary').value = p.itinerary || '';
      document.getElementById('pkg-inclusions').value = p.inclusions || '';
      document.getElementById('pkg-status').value = p.status;
      clearErrors();
      document.getElementById('pkg-modal').style.display = 'flex';
    }

    function openDeleteModal(id) {
      deletingId = id;
      const p = packages.find(x => x.id === id);
      document.getElementById('delete-pkg-name').textContent = p ? p.name : '';
      document.getElementById('delete-modal').style.display = 'flex';
    }

    function closeModals() {
      document.getElementById('pkg-modal').style.display = 'none';
      document.getElementById('delete-modal').style.display = 'none';
    }

    function clearErrors() {
      ['name','destination','price','duration','description'].forEach(f =>
        document.getElementById('err-' + f).textContent = '');
    }

    // ── Form Validation & Save ─────────────────────────────────
    document.getElementById('pkg-form').addEventListener('submit', e => {
      e.preventDefault();
      clearErrors();
      let valid = true;

      const name = document.getElementById('pkg-name').value.trim();
      const dest = document.getElementById('pkg-destination').value.trim();
      const price = parseFloat(document.getElementById('pkg-price').value);
      const dur   = parseInt(document.getElementById('pkg-duration').value);
      const desc  = document.getElementById('pkg-description').value.trim();

      if (!name)        { document.getElementById('err-name').textContent = 'Package name is required.'; valid = false; }
      if (!dest)        { document.getElementById('err-destination').textContent = 'Destination is required.'; valid = false; }
      if (!price || price <= 0) { document.getElementById('err-price').textContent = 'Enter a valid price.'; valid = false; }
      if (!dur || dur < 1)      { document.getElementById('err-duration').textContent = 'Duration must be at least 1 day.'; valid = false; }
      if (!desc)        { document.getElementById('err-description').textContent = 'Description is required.'; valid = false; }
      if (!valid) return;

      const id = document.getElementById('edit-id').value;
      const data = {
        name, destination: dest, price, duration: dur,
        max: parseInt(document.getElementById('pkg-max').value) || 20,
        category: document.getElementById('pkg-category').value,
        description: desc,
        itinerary: document.getElementById('pkg-itinerary').value,
        inclusions: document.getElementById('pkg-inclusions').value,
        status: document.getElementById('pkg-status').value,
      };

      if (id) {
        const idx = packages.findIndex(x => x.id === parseInt(id));
        packages[idx] = { ...packages[idx], ...data };
      } else {
        packages.push({ id: nextId++, bookings: 0, ...data });
      }

      closeModals();
      renderPackages();
    });

    document.getElementById('confirm-delete').addEventListener('click', () => {
      packages = packages.filter(p => p.id !== deletingId);
      closeModals();
      renderPackages();
    });

    // ── Event Bindings ─────────────────────────────────────────
    document.getElementById('add-pkg-btn').addEventListener('click', openAddModal);
    document.getElementById('close-modal').addEventListener('click', closeModals);
    document.getElementById('cancel-modal').addEventListener('click', closeModals);
    document.getElementById('close-delete-modal').addEventListener('click', closeModals);
    document.getElementById('cancel-delete').addEventListener('click', closeModals);
    document.getElementById('pkg-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModals(); });
    document.getElementById('delete-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModals(); });
    document.getElementById('pkg-search').addEventListener('input', renderPackages);
    document.getElementById('pkg-status-filter').addEventListener('change', renderPackages);

    // Auto-open modal if ?action=new in URL
    if (new URLSearchParams(location.search).get('action') === 'new') openAddModal();

    renderPackages();
  </script>

<script src="js/agency.js"></script>
</body>
</html>
