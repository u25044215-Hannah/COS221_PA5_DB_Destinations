<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group Trips — Tripistry Agency</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/agency.css" />
</head>
<body>

<nav class="navbar" id="navbar">
  <a href="../traveller ui/index.html" class="nav-logo">
    <img src="images/logo.png" alt="Tripistry Logo" class="nav-logo-img">
  </a>

  <ul class="nav-links">
    <li><a href="agency-dashboard.html">Dashboard</a></li>
    <li><a href="agency-packages.html">Packages</a></li>
    <li><a href="agency-group-trips.html" class="active">Group Trips</a></li>
  </ul>

  <div class="nav-actions">
    <span class="agency-badge">Agency Portal</span>
    <a href="#" id="logout-btn" class="btn btn-outline btn-sm">Log Out</a>
  </div>
</nav>

<section class="agency-hero">
  <div class="container">
    <span class="eyebrow">Group Travel</span>
    <h1>Group Trip Departures</h1>
    <p>Schedule and manage fixed-date group departures for your travel packages.</p>
  </div>
</section>

<main class="container agency-main">

  <section class="agency-stats agency-stats--sm">
    <div class="stat-card">
      <div>
        <span class="stat-big" id="stat-trips">0</span>
        <span class="stat-label">Group Trips</span>
      </div>
    </div>

    <div class="stat-card">
      <div>
        <span class="stat-big" id="stat-enrolled">0</span>
        <span class="stat-label">Total Enrolled</span>
      </div>
    </div>

    <div class="stat-card">
      <div>
        <span class="stat-big" id="stat-upcoming">0</span>
        <span class="stat-label">Upcoming Departures</span>
      </div>
    </div>

    <div class="stat-card">
      <div>
        <span class="stat-big" id="stat-openspots">0</span>
        <span class="stat-label">Open Spots</span>
      </div>
    </div>
  </section>

  <div class="pkg-toolbar">
    <div class="pkg-toolbar-left">
      <div class="search-input-wrap" style="width:280px;">
        <input type="text" id="trip-search" placeholder="Search trips…" />
      </div>
    </div>

    <button class="btn btn-primary" id="add-trip-btn">Add Group Trip</button>
  </div>

  <div class="trips-grid" id="trips-grid">
    <p style="color:var(--grey-text);padding:2rem 0;">Loading group trips…</p>
  </div>

</main>

<div class="modal-overlay" id="trip-modal" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <h2 id="trip-modal-title">Add Group Trip</h2>
      <button class="modal-close" id="close-trip-modal" type="button">✕</button>
    </div>

    <form class="modal-form" id="trip-form" novalidate>
      <div class="form-grid-2">
        <div class="form-group">
          <label>Group Name <span class="req">*</span></label>
          <input type="text" id="trip-name" required />
          <span class="field-error" id="err-trip-name"></span>
        </div>

        <div class="form-group">
          <label>Base Package <span class="req">*</span></label>
          <select id="trip-package" required>
            <option value="">Select package…</option>
          </select>
          <span class="field-error" id="err-trip-package"></span>
        </div>
      </div>

      <div class="form-group" style="max-width:200px;">
        <label>Starting Member Count</label>
        <input type="number" id="trip-members" value="0" min="0" />
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" id="cancel-trip-modal">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Group Trip</button>
      </div>
    </form>
  </div>
</div>

<div class="modal-overlay" id="enrollees-modal" style="display:none;">
  <div class="modal">
    <div class="modal-header">
      <h2 id="enrollees-title">Enrolled Travellers</h2>
      <button class="modal-close" id="close-enrollees-modal" type="button">✕</button>
    </div>
    <div style="padding:0 24px 24px;">
      <div id="enrollees-list"></div>
    </div>
  </div>
</div>

<script src="js/agency.js"></script>

<script>
  let cachedTrips = [];

  async function loadGroupTripsPage() {
    const grid = document.getElementById("trips-grid");

    const result = await apiRequest(AGENCY_CONTROLLER, "list_group_trips");

    if (!result.success) {
      showMessage(result.message || "Could not load group trips.", "error");
      if (grid) {
        grid.innerHTML = `<p class="empty-state">Failed to load group trips.</p>`;
      }
      return;
    }

    cachedTrips = result.data || [];
    renderGroupTripsPage(cachedTrips);
  }

  function renderGroupTripsPage(trips) {
    const now = new Date();

    const totalTrips = trips.length;

    const totalEnrolled = trips.reduce(function (sum, trip) {
      return sum + parseInt(trip.currentMembers || 0);
    }, 0);

    const totalUpcoming = trips.filter(function (trip) {
      return trip.startDate && new Date(trip.startDate) > now;
    }).length;

    const totalOpenSpots = trips.reduce(function (sum, trip) {
      const max = parseInt(trip.maxCapacity || 0);
      const current = parseInt(trip.currentMembers || 0);
      return sum + (max > 0 ? Math.max(0, max - current) : 0);
    }, 0);

    document.getElementById("stat-trips").textContent = totalTrips;
    document.getElementById("stat-enrolled").textContent = totalEnrolled;
    document.getElementById("stat-upcoming").textContent = totalUpcoming;
    document.getElementById("stat-openspots").textContent = totalOpenSpots;

    const search = (document.getElementById("trip-search").value || "")
      .trim()
      .toLowerCase();

    const filtered = trips.filter(function (trip) {
      return (
        !search ||
        (trip.groupName || "").toLowerCase().includes(search) ||
        (trip.packageTitle || "").toLowerCase().includes(search) ||
        (trip.destinationCity || "").toLowerCase().includes(search) ||
        (trip.destinationCountry || "").toLowerCase().includes(search)
      );
    });

    renderGroupTripsGrid(filtered);
  }

  function openAddTripModal() {
    document.getElementById("trip-form").reset();
    document.getElementById("trip-modal").style.display = "flex";
  }

  function closeTripModals() {
    document.getElementById("trip-modal").style.display = "none";
    document.getElementById("enrollees-modal").style.display = "none";
  }

  function clearTripErrors() {
    document.getElementById("err-trip-name").textContent = "";
    document.getElementById("err-trip-package").textContent = "";
  }

  document.addEventListener("DOMContentLoaded", async function () {
    await loadPackageOptions();
    await loadGroupTripsPage();

    document.getElementById("trip-search").addEventListener("input", function () {
      renderGroupTripsPage(cachedTrips);
    });

    document.getElementById("add-trip-btn").addEventListener("click", openAddTripModal);
    document.getElementById("close-trip-modal").addEventListener("click", closeTripModals);
    document.getElementById("cancel-trip-modal").addEventListener("click", closeTripModals);
    document.getElementById("close-enrollees-modal").addEventListener("click", closeTripModals);

    document.getElementById("trip-form").addEventListener("submit", async function (event) {
      event.preventDefault();
      clearTripErrors();

      const name = document.getElementById("trip-name").value.trim();
      const packageID = document.getElementById("trip-package").value;
      const members = document.getElementById("trip-members").value || "0";

      let valid = true;

      if (!name) {
        document.getElementById("err-trip-name").textContent = "Group name is required.";
        valid = false;
      }

      if (!packageID) {
        document.getElementById("err-trip-package").textContent = "Select a base package.";
        valid = false;
      }

      if (!valid) return;

      const result = await apiRequest(
        AGENCY_CONTROLLER,
        "create_group_trip",
        "POST",
        {
          groupName: name,
          currentMembers: members,
          packageID: packageID
        },
        true
      );

      if (result.success) {
        showMessage("Group trip created.");
        closeTripModals();
        await loadGroupTripsPage();
      } else {
        showMessage(result.message || "Could not create group trip.", "error");
      }
    });

    if (new URLSearchParams(location.search).get("action") === "new") {
      setTimeout(openAddTripModal, 200);
    }
  });
</script>

</body>
</html>
