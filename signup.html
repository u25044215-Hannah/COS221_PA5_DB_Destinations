<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — Tripistry</title>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />

  <script src="api_client.js"></script>
  <script src="auth.js"></script>
</head>
<body>

  <div class="auth-page">

    <div class="auth-left">
      <video autoplay muted loop playsinline class="auth-video">
        <source src="images/PrettyBackground.mp4" type="video/mp4">
      </video>

      <div class="auth-overlay"></div>

      <div class="auth-brand">
        <img src="images/logo.png" alt="Tripistry" class="auth-logo">
        <h1>Start Exploring</h1>
        <p>Create your Tripistry traveller account.</p>
      </div>
    </div>

    <div class="auth-right">

      <form class="auth-card">

        <h2>Create Account</h2>

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" placeholder="Enter full name">
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="Enter email">
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Create password">
        </div>

        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" placeholder="Confirm password">
        </div>

        <button type="submit" class="btn btn-primary auth-btn">
          Create Account
        </button>

        <p class="auth-switch">
          Already have an account?
          <a href="login.html">Log In</a>
        </p>

      </form>
    </div>
  </div>

</body>
</html>
