<!DOCTYPE html>
<!--Simple_Agent_Login.html-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agency Login — Tripistry</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/agency.css" />
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg, #f5f7fa);
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 420px;
    }
    .login-logo { text-align: center; margin-bottom: 24px; }
    .login-logo img { height: 40px; }
    .login-card h1 { font-size: 1.5rem; margin-bottom: 4px; text-align: center; }
    .login-card p.sub { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-weight: 600; font-size: 0.875rem; margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 10px 14px; border: 1.5px solid #ddd;
      border-radius: 8px; font-size: 1rem; box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #4f8ef7; outline: none; }
    #login-error {
      background: #fde8e8; color: #c0392b; border-radius: 8px;
      padding: 10px 14px; font-size: 0.875rem; margin-bottom: 16px; display: none;
    }
    .btn-login {
      width: 100%; padding: 12px; background: #4f8ef7; color: #fff;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-login:hover { background: #2d6fd6; }
    .btn-login:disabled { background: #a0b8e8; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <img src="images/logo.png" alt="Tripistry" />
      </div>
      <h1>Agency Portal</h1>
      <p class="sub">Sign in to manage your packages and bookings</p>

      <div id="login-error"></div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@agency.com" autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn-login" id="login-btn">Sign In</button>
    </div>
  </div>

  <script>
    const errorBox = document.getElementById("login-error");
    const loginBtn = document.getElementById("login-btn");

    async function doLogin() {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      errorBox.style.display = "none";

      if (!email || !password) {
        errorBox.textContent = "Please enter your email and password.";
        errorBox.style.display = "block";
        return;
      }

      loginBtn.disabled    = true;
      loginBtn.textContent = "Signing in…";

      try {
        const res  = await fetch("LoginAgent.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.success) {
          window.location.href = "agency-dashboard.html";
        } else {
          errorBox.textContent    = data.message || "Login failed.";
          errorBox.style.display  = "block";
          loginBtn.disabled       = false;
          loginBtn.textContent    = "Sign In";
        }
      } catch (err) {
        errorBox.textContent   = "Network error. Please try again.";
        errorBox.style.display = "block";
        loginBtn.disabled      = false;
        loginBtn.textContent   = "Sign In";
      }
    }

    loginBtn.addEventListener("click", doLogin);
    document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
  </script>
</body>
</html>
