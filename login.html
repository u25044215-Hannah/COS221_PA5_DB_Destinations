<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Tripistry</title>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <div class="auth-page">

    <div class="auth-left">
      <video autoplay muted loop playsinline class="auth-video">
        <source src="images/PrettyBackground.mp4" type="video/mp4">
      </video>
      <div class="auth-overlay"></div>

      <div class="auth-brand">
        <img src="images/logo.png" alt="Tripistry" class="auth-logo">
        <h1>Welcome Back</h1>
        <p>Log in and continue your next adventure.</p>
      </div>
    </div>

    <div class="auth-right">

      <form class="auth-card">

        <h2>Log In</h2>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="Enter your email">
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="Enter password">
        </div>

        <button type="submit" class="btn btn-primary auth-btn">
          Log In
        </button>

        <p class="auth-switch">
          Don’t have an account?
          <a href="signup.html">Create Account</a>
        </p>
     </form>

    </div>
  </div>

</body>
</html>
