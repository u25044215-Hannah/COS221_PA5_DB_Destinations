<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Packages</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/browse.css" />
</head>
<body>
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-logo">
      <span class="nav-logo-text">Tripistry</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="browse.html" class="active">Browse Packages</a></li>
      <li><a href="compare.html">Compare</a></li>
      <li><a href="bookings.html">My Bookings</a></li>
    </ul>
    <div class="nav-actions">
      <a href="compare.html" class="btn btn-ghost btn-sm compare-nav-btn">
        Compare <span id="compare-badge" class="compare-count-badge" style="display:none">0</span>
      </a>
      <a href="login.html" class="btn btn-outline btn-sm">Log In</a>
      <a href="register.html" class="btn btn-primary btn-sm">Sign Up</a>
    </div>
  </nav>

  <div class="page-hero">
    <div class="container">
      <span class="eyebrow">Discover Your Journey</span>
      <h1>Browse Travel Packages</h1>
      <p>Compare packages from <strong id="total-count">6</strong> trips</p>
    </div>
  </div>

  <div class="browse-layout container">

    <aside class="filters-sidebar">
      <div class="filters-header">
        <h4>Filters</h4>
        <button class="btn btn-ghost btn-sm" id="clear-filters-btn">Clear All</button>
      </div>

      <div class="filter-section">
        <label class="filter-label">Search</label>
        <div class="search-input-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="filter-search" placeholder="Package name or destination…" />
        </div>
      </div>

      <div class="filter-section">
        <label class="filter-label">Destination</label>
        <select id="filter-destination">
          <option value="">All Destinations</option>
          <option value="London">London, UK</option>
          <option value="Tailand">Bangkok, Thailand</option>
          <option value="Switzerland">Interlaken, Switzerland</option>
        </select>
      </div>

      <div class="filter-section">
        <label class="filter-label">Price per Person (ZAR)</label>
        <div class="range-wrap">
          <div class="range-values">
            <span id="price-min-label">R 0</span>
            <span id="price-max-label">R 70,000</span>
          </div>
          <input type="range" id="filter-price-max" min="0" max="70000" step="500" value="70000" class="range-slider" />
        </div>
        <div class="range-hint">Up to <strong id="price-display">R 70,000</strong></div>
      </div>

      <div class="filter-section">
        <label class="filter-label">Duration (Days)</label>
        <div class="checkbox-group">
          <label class="checkbox-item"><input type="checkbox" name="duration" value="1-7" /> 1-7 Days</label>
          <label class="checkbox-item"><input type="checkbox" name="duration" value="8-14" /> 8-14 Days</label>
          <label class="checkbox-item"><input type="checkbox" name="duration" value="15+" /> 15+ Days</label>
        </div>
      </div>

      <div class="filter-section">
        <label class="filter-label">Minimum Rating</label>
        <div class="rating-filter-btns" id="filter-rating-btns">
          <button class="rating-filter-btn active" data-rating="0">All</button>
          <button class="rating-filter-btn" data-rating="3">3+ ★</button>
          <button class="rating-filter-btn" data-rating="4">4+ ★</button>
          <button class="rating-filter-btn" data-rating="4.5">4.5+ ★</button>
        </div>
      </div>

      <div class="filter-section">
        <label class="filter-label">Agency</label>
        <select id="filter-agency">
          <option value="">All Agencies</option>
          <option value="1">Ondafly</option>
          <option value="2">Wanderlust</option>
        </select>
      </div>

      <div class="filter-section">
        <label class="filter-label">Package Type</label>
        <div class="checkbox-group">
          <label class="checkbox-item"><input type="checkbox" id="filter-group" /> Group Trips Only</label>
          <label class="checkbox-item"><input type="checkbox" id="filter-flight" /> Flight Included</label>
        </div>
      </div>

      <button class="btn btn-primary" style="width:100%;margin-top:8px" id="apply-filters-btn">Apply Filters</button>
    </aside>

    <main class="browse-main">

      <div class="browse-toolbar">
        <div class="results-meta">
          <span id="results-count">6 packages found</span>
          <div class="active-filter-chips" id="active-chips"></div>
        </div>
        <div class="toolbar-right">
          <div class="view-toggle">
            <button class="view-btn active" id="grid-view-btn" title="Grid view">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            </button>
            <button class="view-btn" id="list-view-btn" title="List view">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="4" width="18" height="2"/><rect x="3" y="11" width="18" height="2"/><rect x="3" y="18" width="18" height="2"/></svg>
            </button>
          </div>
          <select id="sort-select" class="sort-select">
            <option value="rating">Highest Rated</option>
            <option value="price-asc">Cheapest First</option>
            <option value="price-desc">Most Expensive</option>
            <option value="duration-asc">Shortest Trip</option>
            <option value="newest">Newest</option>
          </select>
        </div>
      </div>

      <div class="compare-bar" id="compare-bar" style="display:none">
        <div class="compare-bar-inner">
          <span id="compare-bar-text">0 packages selected</span>
          <div style="display:flex;gap:10px">
            <button class="btn btn-ghost btn-sm" id="clear-compare-btn">Clear</button>
            <a href="compare.html" class="btn btn-primary btn-sm">Compare</a>
          </div>
        </div>
      </div>

      <div class="browse-grid" id="browse-grid">
      </div>

      <div class="empty-state" id="empty-state" style="display:none">
        <div class="empty-icon">🔍</div>
        <h3>No packages found</h3>
      </div>

    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/browse.js"></script>
</body>
</html>
